<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MEYA</title>

<link rel="icon" type="image/png" href="src/meya.png">

<style>
body, html {
  margin: 0;
  height: 100%;
  font-family: 'Segoe UI', sans-serif;
}

.hero {
  position: relative;
  height: 100%;
}

.hero::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: url('background.jpg') no-repeat center/cover;
  filter: blur(6px) brightness(0.7);
  transform: scale(1.1);
  z-index: -1;
}

.content {
  position: absolute;
  top: 30%;
  left: 8%;
  color: white;
  max-width: 400px;
}

h1 {
  font-size: 40px;
}

p {
  font-size: 16px;
  line-height: 1.5;
}

.btn {
  margin-top: 20px;
  padding: 10px 20px;
  background: green;
  color: white;
  border: none;
  border-radius: 20px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="hero">
  <div class="content">
    <h1>A New Experience Begins Here ✨</h1>
    <p>
      Explore this space and discover something special.<br>
      A place filled with emotions, moments, and surprises.<br>
      I’m sure you’ll feel something beautiful here 💙
    </p>

    <button class="btn" onclick="goNext()">Take a Look 👀</button>
  </div>
</div>

<script>
function goNext() {
  window.location.href = "home.html";
}
</script>

</body>
</html>
